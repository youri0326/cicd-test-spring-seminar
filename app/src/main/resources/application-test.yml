spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL
    username: sa
    password:
    #第6章 step05で追加：@SpringBootTestにおいてMariaDBではなくテスト用のDB(H2)を優先してもらうための設定
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      # テスト開始時にテーブルを作成し、終了時に削除する設定
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG