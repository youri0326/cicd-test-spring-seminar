<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ユーザー登録</title>
</head>
<body>
    <h1>ユーザー登録</h1>

    <!-- エラーメッセージの表示 -->
    <p th:if="${error}" th:text="${error}" style="color: red;"></p>

    <form th:action="@{/register}" method="post">
        <div>
            <label>名前：</label>
            <input type="text" name="name" placeholder="20文字以内">
        </div>
        <div>
            <label>メール：</label>
            <input type="text" name="email" placeholder="example@test.com">
        </div>
        <button type="submit">登録する</button>
    </form>

    <hr>
    <a th:href="@{/register}">リセット</a>
</body>
</html>
